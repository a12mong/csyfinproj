name: Build & Deploy

# Branch → environment mapping:
#   develop → GitHub Environment "dev"        (dev droplet)
#   main    → GitHub Environment "production" (live droplet)
# Each Environment carries its own secrets (DEPLOY_HOST/DEPLOY_USER/
# DEPLOY_SSH_KEY/GHCR_PAT) and variables (NEXT_PUBLIC_API_URL/NEXT_PUBLIC_LIFF_ID).
on:
  push:
    branches: [main, develop]
  workflow_dispatch:

# Never run two deploys at once per environment; queue instead of cancelling
# (a half-finished deploy is worse than a late one).
concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.app }} image
    runs-on: ubuntu-latest
    # Environment is needed here too: NEXT_PUBLIC_* vars are environment-scoped
    # and get baked into the web image at build time.
    environment: ${{ github.ref_name == 'main' && 'production' || 'dev' }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: [api, web]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/csyfinproj-${{ matrix.app }}
          # Every build gets the unique commit-sha tag (used by deploy);
          # the moving tag is "latest" for main and "dev" for develop.
          tags: |
            type=raw,value=${{ github.ref_name == 'main' && 'latest' || 'dev' }}
            type=sha,format=long,prefix=
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Only the web image uses these (NEXT_PUBLIC_* are inlined at build
          # time); harmless no-ops for the api image.
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_LIFF_ID=${{ vars.NEXT_PUBLIC_LIFF_ID }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,scope=${{ matrix.app }},mode=max

  deploy:
    name: Deploy (${{ github.ref_name == 'main' && 'live' || 'dev' }})
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose files to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: "deploy/docker-compose.yml,deploy/Caddyfile"
          target: /opt/csyfinproj
          strip_components: 1
          overwrite: true

      - name: Pull images, sync DB schema, restart stack
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -euo pipefail
            cd /opt/csyfinproj

            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io \
              -u "${{ github.repository_owner }}" --password-stdin

            # Pin the exact image built by this commit (kept in .env so later
            # manual `docker compose up` uses the same tag).
            sed -i '/^IMAGE_TAG=/d' .env
            echo "IMAGE_TAG=${{ github.sha }}" >> .env

            docker compose pull
            docker compose up -d --wait db

            # Sync schema (project convention: prisma db push, see docs).
            # Without --accept-data-loss this FAILS on destructive changes,
            # leaving the old version running — resolve those manually.
            docker compose run --rm api npx prisma db push --skip-generate

            docker compose up -d --remove-orphans --wait
            docker image prune -f
