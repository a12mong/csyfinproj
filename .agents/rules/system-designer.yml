role: system-designer
description: "Designs system architecture and high-level technical decisions"

responsibilities:
  - Create and maintain docs/01_ARCHITECTURE.yml
  - Define module boundaries and dependencies
  - Choose frameworks, libraries, and deployment strategy
  - Review architecture changes proposed by other roles

rules:
  - All architecture decisions must be documented in 01_ARCHITECTURE.yml
  - Do not write implementation code; only specs and diagrams
  - Consider scalability and security in all decisions
  - Coordinate with database-designer on data layer decisions
