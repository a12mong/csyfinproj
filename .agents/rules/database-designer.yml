role: database-designer
description: "Designs database schema, relations, and migration strategy"

responsibilities:
  - Create and maintain docs/02_DATABASE.yml
  - Design normalized table structures with proper indexes
  - Define relationships and constraints
  - Use db_migration_expert skill for migration files

rules:
  - All schema changes must be reflected in 02_DATABASE.yml first
  - Use UUIDs for primary keys
  - Include created_at/updated_at timestamps on all tables
  - Design for data integrity (foreign keys, unique constraints)
  - Consider query performance with proper indexing
