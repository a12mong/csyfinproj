# Stack for a DigitalOcean droplet. One copy of this file per instance:
#   live: /opt/csyfinproj      (.env sets COMPOSE_PROJECT_NAME=csyfinproj,
#                               EDGE_ALIAS=live, COMPOSE_PROFILES=edge)
#   dev:  /opt/csyfinproj-dev  (.env sets COMPOSE_PROJECT_NAME=csyfinproj-dev,
#                               EDGE_ALIAS=dev, DB_HOST_PORT=3307, no profiles)
# Both instances can share one droplet: only the instance with
# COMPOSE_PROFILES=edge runs Caddy (ports 80/443), which reaches every
# instance's api/web over the shared external "edge" network
# (create once: docker network create edge).
name: ${COMPOSE_PROJECT_NAME:-csyfinproj}

services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-csyfinproj}
      MYSQL_USER: ${MYSQL_USER:-csyfin}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    # Bound to localhost only — reachable from the droplet itself / SSH tunnel,
    # never from the internet. Used for seeding and manual inspection.
    # DB_HOST_PORT must differ per instance on a shared droplet (live 3306, dev 3307).
    ports:
      - "127.0.0.1:${DB_HOST_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    image: ghcr.io/${GHCR_OWNER}/csyfinproj-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL:-mysql://${MYSQL_USER:-csyfin}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE:-csyfinproj}}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      PUBLIC_API_URL: ${PUBLIC_API_URL}
      UPLOAD_DIR: /app/uploads
      SECURE_UPLOAD_DIR: /app/secure-uploads
      VAT_RATE: ${VAT_RATE:-7}
      LINE_CHANNEL_ACCESS_TOKEN: ${LINE_CHANNEL_ACCESS_TOKEN:-}
      LINE_CHANNEL_SECRET: ${LINE_CHANNEL_SECRET:-}
      LINE_CHANNEL_ID: ${LINE_CHANNEL_ID:-}
      SMS_API_KEY: ${SMS_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    volumes:
      - uploads:/app/uploads
      - secure_uploads:/app/secure-uploads
    networks:
      default:
      edge:
        aliases:
          - ${EDGE_ALIAS:-live}-api

  web:
    image: ghcr.io/${GHCR_OWNER}/csyfinproj-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      # dev instance ตั้ง APP_ENV=dev ใน .env → หน้าเว็บแสดง badge "DEV" บน nav
      APP_ENV: ${APP_ENV:-live}
    networks:
      default:
      edge:
        aliases:
          - ${EDGE_ALIAS:-live}-web

  # Runs only when COMPOSE_PROFILES=edge (the live instance). One Caddy per
  # droplet owns 80/443 and serves every instance via the edge network.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles: ["edge"]
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
      # dev.localhost = inert placeholder so the Caddyfile's dev block stays
      # valid when no dev instance shares this droplet
      DEV_SITE_ADDRESS: ${DEV_SITE_ADDRESS:-dev.localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - default
      - edge
    depends_on:
      - web
      - api

networks:
  default:
  # Shared across compose projects on the droplet; create once with:
  #   docker network create edge
  edge:
    external: true

volumes:
  db_data:
  uploads:
  secure_uploads:
  caddy_data:
  caddy_config:
